<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Нет соединения — Помощник ведущего</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #07070b;
        color: #e7e7ee;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
      }
      .wrap { padding: 24px; max-width: 360px; }
      .mark {
        width: 56px; height: 56px; margin: 0 auto 20px;
        border-radius: 14px;
        background: linear-gradient(135deg, #8b5cf6, #3b82f6);
        box-shadow: 0 0 40px -6px rgba(139, 92, 246, 0.7);
      }
      h1 { font-size: 18px; margin: 0 0 8px; }
      p { font-size: 14px; color: rgba(255, 255, 255, 0.5); line-height: 1.5; margin: 0 0 20px; }
      button {
        border: 0; cursor: pointer;
        padding: 10px 18px; border-radius: 10px;
        background: linear-gradient(90deg, #8b5cf6, #3b82f6);
        color: #fff; font-size: 14px; font-weight: 600;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="mark"></div>
      <h1>Нет соединения с интернетом</h1>
      <p>Для генерации материалов нужен интернет. Проверь подключение и попробуй снова.</p>
      <button onclick="location.reload()">Обновить</button>
    </div>
  </body>
</html>
